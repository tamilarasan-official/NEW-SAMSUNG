<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, user-scalable=no">
    <title>BBNL - Player</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages/player.css">
    <!-- Tizen Web API -->
    <script type="text/javascript" src="$WEBAPIS/webapis/webapis.js"></script>
</head>

<body class="player-page">
    <div id="player-container">
        <video id="video-player" width="100%" height="100%" controls autoplay></video>

        <div class="player-overlay visible">
            <!-- New Bottom Info Bar -->
            <div class="info-bar-container">

                <!-- Main Info Card -->
                <div class="info-card">

                    <!-- Left: Channel -->
                    <div class="channel-info-section">
                        <div class="channel-logo-circle">
                            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/9/91/Colors_Super_logo.png/180px-Colors_Super_logo.png"
                                alt="Logo" id="ui-channel-logo">
                        </div>
                        <div class="channel-text">
                            <div class="channel-number">008</div>
                            <div class="channel-name-ui" id="ui-channel-name">Colors Super TV</div>
                            <div class="channel-expiry" id="ui-expiry">Expires in 4 days</div>
                        </div>
                    </div>

                    <!-- Center: Program -->
                    <div class="program-info-section">
                        <div class="program-title" id="ui-program-title">John Wick - Chapter 2</div>
                        <div class="program-time" id="ui-program-time">8:00 PM - 9:00 PM</div>

                        <!-- Progress -->
                        <div class="progress-container">
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill" style="width: 65%;"></div>
                            </div>
                        </div>

                        <div class="program-next" id="ui-next">Up Next: Balerina 2025</div>
                    </div>

                    <!-- Right: Controls -->
                    <div class="controls-section">
                        <button class="icon-btn focusable"><span class="icon">文</span></button>
                        <button class="icon-btn focusable"><span class="icon">⋮</span></button>
                    </div>
                </div>

                <!-- Footer Status Bar -->
                <div class="status-footer">
                    <div class="footer-item"><strong>EPG:</strong> HBO_HD_US</div>
                    <div class="footer-item"><strong>Status:</strong> Pay($5.99/mo)</div>
                    <div class="spacer"></div>
                    <div class="footer-item"><strong>User:</strong> user_12a34b56</div>
                    <div class="footer-item"><strong>TV ID:</strong> SN_A987-B534-C322</div>
                    <div class="footer-item">Dec 04, 2025</div>
                    <div class="footer-item">8:39 PM</div>
                </div>

            </div>

            <!-- Keep Back Button functionality but maybe hidden or styled differently if needed, 
                 or we rely on remote back. Let's keep a hidden invisible trigger or just rely on the js handler.
                 Actually, adding a discreet back button at top left is safer for mouse users. -->
            <button id="back-btn" class="back-btn focusable"
                style="position:absolute; top:40px; left:40px; opacity: 0; pointer-events:none;">Back</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/debug-helper.js"></script>
    <script src="js/api.js"></script>
    <script src="js/avplayer.js"></script>
    <script src="js/player.js"></script>
</body>

</html>
