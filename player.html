<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, user-scalable=no">
    <title>Fo-Fi TV - Player</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages/player.css">
    <!-- Tizen Web API -->
    <script type="text/javascript" src="$WEBAPIS/webapis/webapis.js"></script>
</head>

<body class="player-page">
    <div id="player-container">
        <!-- Samsung AVPlay requires object element for native playback -->
        <!-- CRITICAL: Use explicit 1920x1080 pixels for full screen on Samsung TV -->
        <object id="av-player" type="application/avplayer"
            style="width:1920px; height:1080px; position:absolute; top:0; left:0; z-index:0; margin:0; padding:0; border:none;">
        </object>
        <!-- HTML5 video fallback for browser/emulator testing -->
        <video id="video-player"
            style="width:1920px; height:1080px; position:absolute; top:0; left:0; display:none; margin:0; padding:0;"></video>

        <!-- Stream Ad Panel (right side overlay) -->
        <div class="stream-ad-panel" id="streamAdPanel" style="display: none;">
            <img id="streamAdImage" src="" alt="Ad">
        </div>

        <!-- Player Sidebar - Redesigned Layout -->
        <div class="player-sidebar" id="playerSidebar">

            <!-- Top Header: CATEGORIES -->
            <div class="sidebar-main-header">
                <span class="sidebar-main-title">CATEGORIES</span>
            </div>

            <!-- Language Navigation with Arrows -->
            <div class="language-nav-section" id="languageNavSection">
                <button class="lang-nav-arrow lang-nav-left focusable" id="langNavLeft" tabindex="0">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <span class="lang-nav-name" id="langNavName">All Channels</span>
                <button class="lang-nav-arrow lang-nav-right focusable" id="langNavRight" tabindex="0">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>

            <!-- Scrollable Content: Categories + Channels -->
            <div class="sidebar-scroll-content" id="sidebarScrollContent">
                
                <!-- Category List Section (hidden when only 1 category) -->
                <div class="sidebar-categories-section" id="sidebarCategoriesSection">
                    <div class="categories-list" id="categoriesList">
                        <!-- Categories will be loaded dynamically -->
                    </div>
                </div>

                <!-- Channels List Section -->
                <div class="sidebar-channels-section" id="sidebarChannelsSection">
                    <div class="channels-list" id="channelsList">
                        <!-- Channels will be loaded dynamically -->
                    </div>
                </div>

            </div>

        </div>

        <div class="player-overlay visible">
            <!-- Premium Info Bar - Bottom Overlay -->
            <div class="info-bar-premium" id="infoBarPremium">
                <!-- Left: Channel Logo -->
                <div class="info-logo-section">
                    <div class="channel-logo-box">
                        <img src="" alt="Channel Logo" id="ui-channel-logo">
                    </div>
                </div>

                <!-- Center: Channel Details -->
                <div class="info-details-section">
                    <div class="info-row-primary">
                        <span class="channel-lcn" id="ui-channel-number">008</span>
                        <span class="channel-name" id="ui-channel-name">Colors Super TV</span>
                    </div>
                    <div class="info-row-secondary">
                        <span class="expiry-info" id="ui-expiry">Expires in 4 days</span>
                        <span class="info-divider">•</span>
                        <span class="price-info" id="ui-price">Channel Price ₹ : 19.00</span>
                        <span class="info-divider">•</span>
                        <span class="subscription-status" id="ui-subscription">Subscribed : Yes</span>
                    </div>
                </div>

                <!-- Right: Time & Date -->
                <div class="info-time-section">
                    <div class="current-time" id="ui-time">8:39 PM</div>
                    <div class="current-date" id="ui-date">Dec 04, 2025</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Error Popup - Playback Failed -->
    <div class="error-popup-overlay" id="playerErrorPopup" style="display: none;">
        <div class="error-popup">
            <div class="error-popup-image">
                <svg width="320" height="200" viewBox="0 0 320 200">
                    <!-- Monitor -->
                    <rect x="80" y="15" width="160" height="105" rx="10" fill="#ffffff" stroke="#e0e0e0"
                        stroke-width="2" />
                    <rect x="80" y="15" width="160" height="25" rx="10" fill="#2d6a4f" />
                    <rect x="80" y="30" width="160" height="10" fill="#2d6a4f" />
                    <text x="160" y="33" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">FAILED TO
                        LOAD CHANNELS</text>
                    <rect x="95" y="50" width="130" height="55" rx="4" fill="#e8e8e8" />
                    <text x="160" y="72" text-anchor="middle" fill="#888" font-size="10">No channels</text>
                    <text x="160" y="86" text-anchor="middle" fill="#888" font-size="10">available</text>
                    <circle cx="210" cy="45" r="12" fill="#f5a623" />
                    <text x="210" y="50" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">!</text>
                    <rect x="145" y="120" width="30" height="8" fill="#ccc" rx="2" />
                    <rect x="130" y="128" width="60" height="5" fill="#ddd" rx="2" />
                    <!-- Dog (left) -->
                    <ellipse cx="65" cy="155" rx="28" ry="22" fill="#c8913e" />
                    <circle cx="65" cy="130" r="18" fill="#c8913e" />
                    <ellipse cx="52" cy="120" rx="7" ry="10" fill="#c8913e" />
                    <ellipse cx="78" cy="120" rx="7" ry="10" fill="#c8913e" />
                    <circle cx="58" cy="128" r="3" fill="#333" />
                    <circle cx="72" cy="128" r="3" fill="#333" />
                    <ellipse cx="65" cy="135" rx="4" ry="3" fill="#333" />
                    <path d="M58,140 Q65,146 72,140" stroke="#333" stroke-width="1.5" fill="none" />
                    <!-- Cat (right) -->
                    <ellipse cx="255" cy="155" rx="25" ry="22" fill="#d48a3e" />
                    <circle cx="255" cy="130" r="16" fill="#d48a3e" />
                    <polygon points="240,120 244,108 250,120" fill="#d48a3e" />
                    <polygon points="260,120 266,108 270,120" fill="#d48a3e" />
                    <circle cx="248" cy="128" r="3" fill="#333" />
                    <circle cx="262" cy="128" r="3" fill="#333" />
                    <ellipse cx="255" cy="134" rx="3" ry="2" fill="#ff9999" />
                    <line x1="240" y1="150" x2="225" y2="135" stroke="#666" stroke-width="2" />
                    <circle cx="225" cy="135" r="4" fill="#666" />
                </svg>
            </div>
            <h2 class="error-popup-title" id="playerErrorTitle">Playback Error</h2>
            <p class="error-popup-message" id="playerErrorMessage">Please Check your network and try again</p>
            <button class="error-popup-btn focusable" id="playerRetryBtn" tabindex="0">Try Again</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/avplayer.js"></script>
    <script src="js/player.js"></script>
</body>

</html>
