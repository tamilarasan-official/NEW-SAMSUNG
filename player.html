<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, user-scalable=no">
    <title>Fo-Fi TV - Player</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages/player.css">
    <!-- Tizen Web API -->
    <script type="text/javascript" src="$WEBAPIS/webapis/webapis.js"></script>
</head>

<body class="player-page">
    <div id="player-container">
        <!-- Samsung AVPlay requires object element for native playback -->
        <object id="av-player" type="application/avplayer"
                style="width:100%; height:100%; position:absolute; top:0; left:0; z-index:0;">
        </object>
        <!-- HTML5 video fallback for browser/emulator testing -->
        <video id="video-player" width="100%" height="100%" style="display:none;"></video>

        <div class="player-overlay visible">
            <!-- New Bottom Info Bar -->
            <div class="info-bar-container">

                <!-- Main Info Card -->
                <div class="info-card">

                    <!-- Left: Channel -->
                    <div class="channel-info-section">
                        <div class="channel-logo-circle">
                            <img src="" alt="Logo" id="ui-channel-logo">
                        </div>
                        <div class="channel-text">
                            <div class="channel-number" id="ui-channel-number">000</div>
                            <div class="channel-name-ui" id="ui-channel-name">Loading...</div>
                            <div class="channel-expiry" id="ui-expiry">--</div>
                        </div>
                    </div>

                    <!-- Center: Program -->
                    <div class="program-info-section">
                        <div class="program-title" id="ui-program-title">Live Stream</div>
                        <div class="program-time" id="ui-program-time">--</div>

                        <!-- Progress -->
                        <div class="progress-container">
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill" style="width: 0%;"></div>
                            </div>
                        </div>

                        <div class="program-next" id="ui-next">--</div>
                    </div>

                    <!-- Right: Controls -->
                    <div class="controls-section">
                        <button class="icon-btn focusable"><span class="icon">文</span></button>
                        <button class="icon-btn focusable"><span class="icon">⋮</span></button>
                    </div>
                </div>

                <!-- Footer Status Bar -->
                <div class="status-footer">
                    <div class="footer-item"><strong>EPG:</strong> <span id="ui-epg">--</span></div>
                    <div class="footer-item"><strong>Status:</strong> <span id="ui-status">--</span></div>
                    <div class="spacer"></div>
                    <div class="footer-item"><strong>User:</strong> <span id="ui-user">--</span></div>
                    <div class="footer-item"><strong>TV ID:</strong> <span id="ui-tvid">--</span></div>
                    <div class="footer-item" id="ui-date">--</div>
                    <div class="footer-item" id="ui-time">--</div>
                </div>

            </div>

            <!-- Keep Back Button functionality but maybe hidden or styled differently if needed, 
                 or we rely on remote back. Let's keep a hidden invisible trigger or just rely on the js handler.
                 Actually, adding a discreet back button at top left is safer for mouse users. -->
            <button id="back-btn" class="back-btn focusable"
                style="position:absolute; top:40px; left:40px; opacity: 0; pointer-events:none;">Back</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/avplayer.js"></script>
    <script src="js/player.js"></script>
</body>

</html>
