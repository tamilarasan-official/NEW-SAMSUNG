<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, user-scalable=no">
    <!-- CSP for Samsung Tizen widget - allow fetch from any origin for image loading -->
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; img-src * data: blob:; connect-src * data: blob:;">
    <title>Fo-Fi TV - OTT Apps</title>
    <!-- Base Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages/apps.css">
    <script type="text/javascript" src="$WEBAPIS/webapis/webapis.js"></script>
</head>

<body style="background-color: #000000 !important; overflow: hidden;">
    <style>
        body { background: #000 !important; }
        .ott-content.blurred, .ott-header.blurred { opacity: 0 !important; transition: opacity 0.3s ease; }
    </style>

    <!-- Fixed Header (Same style as Channels page) -->
    <div class="ott-header">
        <button class="back-btn focusable" tabindex="0" onclick="window.__BBNL_NAVIGATING = true; window.location.replace('home.html');">
            <span class="back-icon">←</span>
        </button>
        <h1 class="page-title">OTT Apps</h1>
        <!-- Search Bar (Same style as Home page) -->
        <div class="search-bar">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="tel" class="search-input focusable" tabindex="0" placeholder="Enter App Number..." id="searchInput" inputmode="numeric" autocomplete="off">
        </div>
    </div>

    <!-- Main Content Area / Apps Grid -->
    <main class="ott-content">
        <div class="apps-grid" id="appsGrid">
            <!-- Apps will be loaded dynamically from API -->
            <div class="loading-spinner">Loading Apps...</div>
        </div>
    </main>

    <!-- Coming Soon Popup -->
    <div class="error-popup-overlay" id="noAppsPopup" style="display: none;">
        <div class="error-popup">
            <div class="error-popup-image">
                <img id="errorImg_comingSoonOtt" src="" alt="Coming soon" crossorigin="anonymous">
            </div>
            <h2 class="error-popup-title">Coming Soon</h2>
            <p class="error-popup-message">OTT Apps feature is coming soon. Stay tuned!</p>
            <button class="error-popup-btn focusable" id="retryAppsBtn" tabindex="0">Go Back</button>
        </div>
    </div>

    <!-- Specific JS for this page -->
    <script src="js/api.js" defer></script>
    <script src="js/ott-apps.js" defer></script>
</body>

</html>
