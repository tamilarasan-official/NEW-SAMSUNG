<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, user-scalable=no">
    <title>BBNL TV Diagnostic Tool</title>
    <script type="text/javascript" src="$WEBAPIS/webapis/webapis.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 30px;
            overflow-y: auto;
            height: 100vh;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #4fc3f7;
        }
        .test-section {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .test-section h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #81c784;
        }
        #log {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            height: 400px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.6;
        }
        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .log-success { color: #4caf50; }
        .log-error { color: #f44336; }
        .log-info { color: #2196f3; }
        .log-warning { color: #ff9800; }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .test-btn {
            background: linear-gradient(135deg, #1976d2, #1565c0);
            color: #fff;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .test-btn:hover, .test-btn:focus {
            background: linear-gradient(135deg, #1565c0, #0d47a1);
            transform: scale(1.02);
            outline: 2px solid #4fc3f7;
        }
        .test-btn.danger {
            background: linear-gradient(135deg, #d32f2f, #c62828);
        }
        .test-btn.success {
            background: linear-gradient(135deg, #388e3c, #2e7d32);
        }

        .device-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .info-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 15px;
        }
        .info-card .label {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            margin-bottom: 5px;
        }
        .info-card .value {
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            word-break: break-all;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .back-btn:hover, .back-btn:focus {
            background: rgba(255,255,255,0.15);
            outline: none;
        }
    </style>
</head>
<body>
    <button class="back-btn focusable" onclick="window.location.href='home.html'">← Back to Home</button>

    <h1>BBNL TV Diagnostic Tool</h1>

    <!-- Device Info Cards -->
    <div class="device-info">
        <div class="info-card">
            <div class="label">Connection Type</div>
            <div class="value" id="info-connection">Checking...</div>
        </div>
        <div class="info-card">
            <div class="label">IP Address</div>
            <div class="value" id="info-ip">Checking...</div>
        </div>
        <div class="info-card">
            <div class="label">MAC Address</div>
            <div class="value" id="info-mac">Checking...</div>
        </div>
        <div class="info-card">
            <div class="label">TV Model</div>
            <div class="value" id="info-model">Checking...</div>
        </div>
        <div class="info-card">
            <div class="label">Firmware</div>
            <div class="value" id="info-firmware">Checking...</div>
        </div>
        <div class="info-card">
            <div class="label">DUID</div>
            <div class="value" id="info-duid">Checking...</div>
        </div>
    </div>

    <!-- Test Buttons -->
    <div class="btn-group">
        <button class="test-btn focusable" onclick="runAllTests()">Run All Tests</button>
        <button class="test-btn focusable" onclick="testNetwork()">Test Network</button>
        <button class="test-btn focusable" onclick="testAPIEndpoints()">Test APIs</button>
        <button class="test-btn focusable" onclick="testAVPlay()">Test AVPlay</button>
        <button class="test-btn danger focusable" onclick="clearLog()">Clear Log</button>
    </div>

    <!-- Log Output -->
    <div class="test-section">
        <h2>Diagnostic Log</h2>
        <div id="log"></div>
    </div>

    <script>
        var logEl = document.getElementById('log');

        // Logging functions
        function addLog(msg, type) {
            type = type || 'info';
            var time = new Date().toLocaleTimeString();
            var className = 'log-' + type;
            logEl.innerHTML += '<div class="log-entry ' + className + '">[' + time + '] ' + msg + '</div>';
            logEl.scrollTop = logEl.scrollHeight;
            console.log('[' + type.toUpperCase() + ']', msg);
        }

        function clearLog() {
            logEl.innerHTML = '';
            addLog('Log cleared', 'info');
        }

        // Initialize on load
        window.onload = function() {
            addLog('BBNL TV Diagnostic Tool Started', 'info');

            // Check if running on Tizen TV or Browser
            if (typeof webapis === 'undefined') {
                addLog('⚠️ BROWSER MODE: Some tests will fail due to CORS restrictions', 'warning');
                addLog('⚠️ For full testing, deploy to Samsung Tizen TV', 'warning');
            } else {
                addLog('✓ Running on Samsung Tizen TV', 'success');
            }

            loadDeviceInfo();

            // Register Tizen keys
            try {
                tizen.tvinputdevice.registerKeyBatch(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter', 'Return']);
            } catch(e) {
                // Silent fail in browser
            }
        };

        // Load device info cards
        function loadDeviceInfo() {
            try {
                if (typeof webapis !== 'undefined') {
                    // Connection Type
                    var connType = webapis.network.getActiveConnectionType();
                    var types = {0: 'Disconnected', 1: 'WiFi', 2: 'Cellular', 3: 'Ethernet'};
                    document.getElementById('info-connection').innerText = types[connType] || 'Unknown';

                    // IP Address
                    if (connType > 0) {
                        document.getElementById('info-ip').innerText = webapis.network.getIp(connType) || 'N/A';
                    } else {
                        document.getElementById('info-ip').innerText = 'Disconnected';
                    }

                    // MAC Address
                    try {
                        var mac = webapis.network.getMac ? webapis.network.getMac(connType) : 'N/A';
                        document.getElementById('info-mac').innerText = mac || 'N/A';
                    } catch(e) {
                        document.getElementById('info-mac').innerText = 'N/A';
                    }

                    // TV Model
                    document.getElementById('info-model').innerText = webapis.productinfo.getModel() || 'N/A';

                    // Firmware
                    document.getElementById('info-firmware').innerText = webapis.productinfo.getFirmware() || 'N/A';

                    // DUID
                    document.getElementById('info-duid').innerText = webapis.productinfo.getDuid() || 'N/A';

                    addLog('Device info loaded successfully', 'success');
                } else {
                    addLog('webapis not available (running in browser/emulator)', 'warning');
                    document.getElementById('info-connection').innerText = 'Emulator';
                    document.getElementById('info-ip').innerText = '127.0.0.1';
                    document.getElementById('info-mac').innerText = '00:00:00:00:00:00';
                    document.getElementById('info-model').innerText = 'Browser/Emulator';
                    document.getElementById('info-firmware').innerText = 'N/A';
                    document.getElementById('info-duid').innerText = 'EMULATOR';
                }
            } catch(e) {
                addLog('Error loading device info: ' + e.message, 'error');
            }
        }

        // Run all tests
        function runAllTests() {
            addLog('========== RUNNING ALL TESTS ==========', 'info');
            testNetwork();
            setTimeout(testAPIEndpoints, 2000);
            setTimeout(testAVPlay, 5000);
        }

        // TEST 1: Network Connectivity
        function testNetwork() {
            addLog('--- TEST: Network Connectivity ---', 'info');

            // Test BBNL domains
            var domains = [
                'http://124.40.244.211/netmon/cabletvapis/appversion',
                'https://livestream3.bbnl.in'
            ];

            domains.forEach(function(url) {
                fetch(url, {method: 'HEAD', mode: 'no-cors'})
                    .then(function() {
                        addLog('✓ Reachable: ' + url, 'success');
                    })
                    .catch(function(e) {
                        addLog('✗ Failed: ' + url + ' - ' + e.message, 'error');
                    });
            });
        }

        // TEST 2: API Endpoints
        function testAPIEndpoints() {
            addLog('--- TEST: API Endpoints ---', 'info');

            if (typeof webapis === 'undefined') {
                addLog('⚠️ API tests may fail in browser due to CORS', 'warning');
            }

            // Test App Version API
            fetch('http://124.40.244.211/netmon/cabletvapis/appversion')
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.status && data.status.err_code === 0) {
                        addLog('✓ App Version API: v' + data.body.appversion, 'success');
                        addLog('  Message: ' + data.body.verchngmsg, 'info');
                    } else {
                        addLog('✗ App Version API Error: ' + (data.status ? data.status.err_msg : 'Unknown'), 'error');
                    }
                })
                .catch(function(e) {
                    if (typeof webapis === 'undefined') {
                        addLog('✗ App Version API: CORS blocked (expected in browser)', 'warning');
                    } else {
                        addLog('✗ App Version API Failed: ' + e.message, 'error');
                    }
                });

            // Test Channel List API (need device info)
            try {
                var deviceInfo = {
                    devslno: 'FOFI20191129000336',
                    mac_address: '00:00:00:00:00:00'
                };

                if (typeof webapis !== 'undefined') {
                    deviceInfo.mac_address = webapis.network.getMac ? webapis.network.getMac(webapis.network.getActiveConnectionType()) : deviceInfo.mac_address;
                }

                var channelUrl = 'http://124.40.244.211/netmon/cabletvapis/chnldetails?devslno=' + deviceInfo.devslno + '&macaddress=' + deviceInfo.mac_address;

                fetch(channelUrl)
                    .then(function(res) { return res.json(); })
                    .then(function(data) {
                        if (data.status && data.status.err_code === 0) {
                            var count = data.body ? data.body.length : 0;
                            addLog('✓ Channel API: ' + count + ' channels found', 'success');
                        } else {
                            addLog('✗ Channel API Error: ' + (data.status ? data.status.err_msg : 'Unknown'), 'error');
                        }
                    })
                    .catch(function(e) {
                        if (typeof webapis === 'undefined') {
                            addLog('✗ Channel API: CORS blocked (expected in browser)', 'warning');
                        } else {
                            addLog('✗ Channel API Failed: ' + e.message, 'error');
                        }
                    });
            } catch(e) {
                addLog('✗ Channel API Test Error: ' + e.message, 'error');
            }
        }

        // TEST 3: AVPlay Streaming
        function testAVPlay() {
            addLog('--- TEST: AVPlay Streaming ---', 'info');

            try {
                if (typeof webapis === 'undefined' || !webapis.avplay) {
                    addLog('⚠️ AVPlay not available (browser mode)', 'warning');
                    addLog('⚠️ Deploy to Samsung TV to test streaming', 'warning');
                    return;
                }

                // AVPlay listener
                var listener = {
                    onbufferingstart: function() {
                        addLog('AVPlay: Buffering started...', 'info');
                    },
                    onbufferingprogress: function(percent) {
                        addLog('AVPlay: Buffering ' + percent + '%', 'info');
                    },
                    onbufferingcomplete: function() {
                        addLog('✓ AVPlay: Buffering complete', 'success');
                    },
                    oncurrentplaytime: function(time) {
                        addLog('AVPlay: Playing at ' + Math.floor(time/1000) + 's', 'info');
                    },
                    onerror: function(eventType) {
                        addLog('✗ AVPlay Error: ' + eventType, 'error');
                    },
                    onevent: function(eventType, eventData) {
                        addLog('AVPlay Event: ' + eventType + (eventData ? ' - ' + eventData : ''), 'info');
                    },
                    onstreamcompleted: function() {
                        addLog('AVPlay: Stream completed', 'info');
                    },
                    onsubtitlechange: function() {}
                };

                // Test with BBNL stream URL (Samsung HTTP/1.1 compatible server)
                var testStreamUrl = 'https://livestream3.bbnl.in/9d0ac588-1ea4-4a3e-8301-e65907ba98f4/index.m3u8';

                addLog('Testing stream: ' + testStreamUrl, 'info');

                // Close any existing playback
                try {
                    webapis.avplay.close();
                } catch(e) {}

                // Open and prepare stream
                webapis.avplay.open(testStreamUrl);
                webapis.avplay.setListener(listener);
                webapis.avplay.setDisplayRect(0, 0, 1920, 1080);

                webapis.avplay.prepareAsync(
                    function() {
                        addLog('✓ AVPlay: Stream prepared successfully', 'success');
                        addLog('AVPlay: Starting playback...', 'info');
                        webapis.avplay.play();

                        // Stop after 10 seconds
                        setTimeout(function() {
                            try {
                                webapis.avplay.stop();
                                webapis.avplay.close();
                                addLog('AVPlay: Test playback stopped', 'info');
                            } catch(e) {}
                        }, 10000);
                    },
                    function(error) {
                        addLog('✗ AVPlay Prepare Failed: ' + (error.message || error), 'error');
                    }
                );

            } catch(e) {
                addLog('✗ AVPlay Test Error: ' + e.message, 'error');
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 10009) { // Back key
                window.location.href = 'home.html';
            }
        });
    </script>
</body>
</html>
