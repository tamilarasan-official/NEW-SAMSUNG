<!DOCTYPE html>
<html>
<head>
    <title>BBNL API Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .test-section {
            background: #2a2a2a;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
        }
        button:hover {
            background: #45a049;
        }
        pre {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
        }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        .info { color: #2196F3; }
        h2 { color: #4CAF50; margin-top: 0; }
        .endpoint {
            background: #333;
            padding: 5px 10px;
            border-radius: 4px;
            display: inline-block;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <h1>🔧 BBNL API Diagnostic Tool</h1>

    <div class="test-section">
        <h2>1. Test Channel List API</h2>
        <p>Endpoint: <span class="endpoint">POST /chnl_list</span></p>
        <button onclick="testChannelList()">Test Channel List</button>
        <button onclick="testWithSearch()">Test Search (zee)</button>
        <button onclick="testWithCategory()">Test Category Filter</button>
        <div id="channel-result"></div>
    </div>

    <div class="test-section">
        <h2>2. Test Categories API</h2>
        <p>Endpoint: <span class="endpoint">POST /chnl_categlist</span></p>
        <button onclick="testCategories()">Test Categories</button>
        <div id="category-result"></div>
    </div>

    <div class="test-section">
        <h2>3. Direct Fetch Test</h2>
        <p>Raw fetch without BBNL_API wrapper</p>
        <button onclick="testDirectFetch()">Test Direct Fetch</button>
        <div id="direct-result"></div>
    </div>

    <div class="test-section">
        <h2>4. Configuration Check</h2>
        <button onclick="checkConfig()">Check API Configuration</button>
        <div id="config-result"></div>
    </div>

    <script src="js/api.js"></script>
    <script>
        console.log("=== BBNL API DIAGNOSTIC TOOL ===");
        console.log("BBNL_API available:", typeof BBNL_API !== 'undefined');

        // Test 1: Channel List
        async function testChannelList() {
            const result = document.getElementById('channel-result');
            result.innerHTML = '<p class="info">⏳ Loading channels...</p>';

            try {
                console.log("[TEST] Calling BBNL_API.getChannelList()");
                const channels = await BBNL_API.getChannelList();

                console.log("[TEST] Channels received:", channels);

                if (Array.isArray(channels) && channels.length > 0) {
                    result.innerHTML = `
                        <p class="success">✅ SUCCESS: Received ${channels.length} channels</p>
                        <p><strong>First Channel:</strong></p>
                        <pre>${JSON.stringify(channels[0], null, 2)}</pre>
                        <p><strong>Channel Fields:</strong></p>
                        <pre>${Object.keys(channels[0]).join(', ')}</pre>
                        <p><strong>All Channels:</strong></p>
                        <pre>${JSON.stringify(channels, null, 2)}</pre>
                    `;
                } else {
                    result.innerHTML = `
                        <p class="error">❌ ERROR: No channels returned</p>
                        <p>Received: ${Array.isArray(channels) ? 'Empty array' : typeof channels}</p>
                        <pre>${JSON.stringify(channels, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                console.error("[TEST] Error:", error);
                result.innerHTML = `
                    <p class="error">❌ EXCEPTION: ${error.message}</p>
                    <pre>${error.stack}</pre>
                `;
            }
        }

        // Test 2: Search
        async function testWithSearch() {
            const result = document.getElementById('channel-result');
            result.innerHTML = '<p class="info">⏳ Searching for "zee"...</p>';

            try {
                const channels = await BBNL_API.searchChannels("zee");

                if (Array.isArray(channels) && channels.length > 0) {
                    result.innerHTML = `
                        <p class="success">✅ SUCCESS: Found ${channels.length} channels matching "zee"</p>
                        <pre>${JSON.stringify(channels, null, 2)}</pre>
                    `;
                } else {
                    result.innerHTML = `
                        <p class="error">❌ No results for "zee"</p>
                        <pre>${JSON.stringify(channels, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                result.innerHTML = `<p class="error">❌ ERROR: ${error.message}</p>`;
            }
        }

        // Test 3: Category Filter
        async function testWithCategory() {
            const result = document.getElementById('channel-result');
            result.innerHTML = '<p class="info">⏳ Loading category 11 channels...</p>';

            try {
                const channels = await BBNL_API.getChannelsByCategory("11");

                if (Array.isArray(channels) && channels.length > 0) {
                    result.innerHTML = `
                        <p class="success">✅ SUCCESS: Found ${channels.length} channels in category 11</p>
                        <pre>${JSON.stringify(channels, null, 2)}</pre>
                    `;
                } else {
                    result.innerHTML = `
                        <p class="error">❌ No channels in category 11</p>
                        <pre>${JSON.stringify(channels, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                result.innerHTML = `<p class="error">❌ ERROR: ${error.message}</p>`;
            }
        }

        // Test 4: Categories
        async function testCategories() {
            const result = document.getElementById('category-result');
            result.innerHTML = '<p class="info">⏳ Loading categories...</p>';

            try {
                const categories = await BBNL_API.getCategories();

                if (Array.isArray(categories) && categories.length > 0) {
                    result.innerHTML = `
                        <p class="success">✅ SUCCESS: Received ${categories.length} categories</p>
                        <pre>${JSON.stringify(categories, null, 2)}</pre>
                    `;
                } else {
                    result.innerHTML = `
                        <p class="error">❌ No categories returned</p>
                        <pre>${JSON.stringify(categories, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                result.innerHTML = `<p class="error">❌ ERROR: ${error.message}</p>`;
            }
        }

        // Test 5: Direct Fetch
        async function testDirectFetch() {
            const result = document.getElementById('direct-result');
            result.innerHTML = '<p class="info">⏳ Testing direct fetch...</p>';

            try {
                const url = 'http://localhost:3000/chnl_list';
                const payload = {
                    userid: "testiser1",
                    mobile: "7800000001",
                    langid: "9",
                    grid: "",
                    bcid: "",
                    search: ""
                };

                console.log("[DIRECT FETCH] URL:", url);
                console.log("[DIRECT FETCH] Payload:", payload);

                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                console.log("[DIRECT FETCH] Response status:", response.status);

                const data = await response.json();
                console.log("[DIRECT FETCH] Response data:", data);

                result.innerHTML = `
                    <p class="success">✅ Fetch successful</p>
                    <p><strong>Status:</strong> ${response.status}</p>
                    <p><strong>Response:</strong></p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;

                // Check response structure
                if (data.body && data.body[0] && data.body[0].channels) {
                    result.innerHTML += `
                        <p class="success">✅ Response has correct structure: body[0].channels</p>
                        <p>Channels count: ${data.body[0].channels.length}</p>
                    `;
                }
            } catch (error) {
                result.innerHTML = `
                    <p class="error">❌ Fetch failed: ${error.message}</p>
                    <p>Make sure proxy server is running on http://localhost:3000</p>
                    <pre>${error.stack}</pre>
                `;
            }
        }

        // Test 6: Configuration Check
        function checkConfig() {
            const result = document.getElementById('config-result');

            const config = {
                'BBNL_API exists': typeof BBNL_API !== 'undefined',
                'getChannelList exists': typeof BBNL_API?.getChannelList === 'function',
                'searchChannels exists': typeof BBNL_API?.searchChannels === 'function',
                'getChannelsByCategory exists': typeof BBNL_API?.getChannelsByCategory === 'function',
                'DeviceInfo exists': typeof DeviceInfo !== 'undefined',
                'AuthAPI exists': typeof AuthAPI !== 'undefined',
                'ChannelsAPI exists': typeof ChannelsAPI !== 'undefined',
            };

            result.innerHTML = `
                <p class="success">Configuration Check:</p>
                <pre>${JSON.stringify(config, null, 2)}</pre>
            `;

            console.log("[CONFIG]", config);
        }

        // Auto-run configuration check on load
        window.addEventListener('DOMContentLoaded', () => {
            checkConfig();
        });
    </script>
</body>
</html>
