<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, user-scalable=no">
    <title>BBNL - Verify</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="text/javascript" src="$WEBAPIS/webapis/webapis.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2 class="verify-title">Enter Verification Code</h2>

            <div class="verify-steps">
                <span class="verify-step completed">Phone</span>
                <span class="verify-dots">......</span>
                <span class="verify-step active">Verify</span>
            </div>

            <form class="auth-form" action="home.html" method="get">
                <div class="otp-container">
                    <input id="otp1" name="otp1" type="text" class="otp-input focusable" maxlength="1"
                        autocomplete="off" tabindex="0">
                    <input id="otp2" name="otp2" type="text" class="otp-input focusable" maxlength="1"
                        autocomplete="off" tabindex="0">
                    <input id="otp3" name="otp3" type="text" class="otp-input focusable" maxlength="1"
                        autocomplete="off" tabindex="0">
                    <input id="otp4" name="otp4" type="text" class="otp-input focusable" maxlength="1"
                        autocomplete="off" tabindex="0">
                </div>
                <button type="button" id="verifyBtn" class="verify-btn focusable" tabindex="0">Verify</button>
                <div class="resend-text">Didn't receive the code? <span id="timer" style="color:#2b4cff;">00:59</span>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
