<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; img-src * data: blob:; connect-src * data: blob:;">
    <title>Fo-Fi TV - Verify</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="text/javascript" src="$WEBAPIS/webapis/webapis.js"></script>
    <!-- Early auth redirect — runs BEFORE body renders to prevent login page flash -->
    <script>
        (function () {
            try {
                // If _pendingOTP exists, user came from login flow — stay on verify page
                if (sessionStorage.getItem("_pendingOTP")) return;

                function readResolvedUser() {
                    var primaryRaw = localStorage.getItem("bbnl_user");
                    var backupRaw = localStorage.getItem("bbnl_user_backup");
                    var primaryUser = null;
                    var backupUser = null;

                    if (primaryRaw) {
                        try {
                            var parsedPrimary = JSON.parse(primaryRaw);
                            if (parsedPrimary && parsedPrimary.userid) primaryUser = parsedPrimary;
                        } catch (e1) {}
                    }

                    if (backupRaw) {
                        try {
                            var parsedBackup = JSON.parse(backupRaw);
                            if (parsedBackup && parsedBackup.userid) backupUser = parsedBackup;
                        } catch (e2) {}
                    }

                    var resolvedUser = primaryUser || backupUser;
                    if (!resolvedUser) return null;

                    var resolvedJson = JSON.stringify(resolvedUser);
                    if (primaryRaw !== resolvedJson) localStorage.setItem("bbnl_user", resolvedJson);
                    if (backupRaw !== resolvedJson) localStorage.setItem("bbnl_user_backup", resolvedJson);
                    if (localStorage.getItem("hasLoggedInOnce") !== "true") {
                        localStorage.setItem("hasLoggedInOnce", "true");
                    }
                    return resolvedUser;
                }

                var resolvedUser = readResolvedUser();
                if (resolvedUser) {
                    sessionStorage.removeItem('fofi_autoplay_done');
                    sessionStorage.removeItem('home_init_done');
                    localStorage.removeItem('bbnl_relaunch_pending');
                    window.location.replace("home.html");
                    return;
                }
            } catch (e) {}
        })();
    </script>
    <script src="js/api.js"></script>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2 class="verify-title">Enter Verification Code</h2>

            <div class="verify-steps">
                <span class="verify-step completed">Phone</span>
                <span class="verify-dots">......</span>
                <span class="verify-step active">Verify</span>
            </div>

            <form class="auth-form" onsubmit="return false;">
                <div class="otp-container">
                    <input id="otp1" name="otp1" type="tel" class="otp-input focusable"
                        autocomplete="off" inputmode="numeric" pattern="[0-9]" tabindex="0">
                    <input id="otp2" name="otp2" type="tel" class="otp-input focusable"
                        autocomplete="off" inputmode="numeric" pattern="[0-9]" tabindex="0">
                    <input id="otp3" name="otp3" type="tel" class="otp-input focusable"
                        autocomplete="off" inputmode="numeric" pattern="[0-9]" tabindex="0">
                    <input id="otp4" name="otp4" type="tel" class="otp-input focusable"
                        autocomplete="off" inputmode="numeric" pattern="[0-9]" tabindex="0">
                </div>
                <button type="button" id="verifyBtn" class="verify-btn focusable" tabindex="0">Verify</button>
                <div class="resend-otp-row">
                    <span class="resend-timer" id="resendTimer">Resend OTP in <span id="resendCountdown">30</span>s</span>
                    <button type="button" id="resendOtpBtn" class="resend-otp-btn focusable" tabindex="0" style="display:none;">Resend OTP</button>
                </div>
            </form>
        </div>
    </div>


    <!-- Error Popup Modal -->
    <div id="errorPopup" class="otp-popup-overlay error-popup" style="display: none;">
        <div class="otp-popup-container error-container">
            <div class="otp-popup-icon error-icon">
                <span>❌</span>
            </div>
            <h3 class="otp-popup-title error-title" id="errorPopupTitle">Invalid OTP</h3>
            <p class="otp-popup-message" id="errorPopupMessage">The OTP you entered is incorrect. Please try again.</p>
            <button type="button" id="errorPopupCloseBtn" class="otp-popup-btn error-btn focusable">Try Again</button>
        </div>
    </div>
    
    <script src="js/main.js"></script>
</body>

</html>
