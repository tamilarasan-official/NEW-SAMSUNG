<!DOCTYPE html>
<html>
<head>
    <title>Real API Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1400px;
            margin: 20px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .result {
            background: #2a2a2a;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
        }
        button:hover {
            background: #45a049;
        }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
        pre {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
        }
        .channel-card {
            background: #333;
            padding: 10px;
            margin: 5px;
            border-radius: 4px;
            display: inline-block;
            width: 200px;
        }
        .channel-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
    </style>
</head>
<body>
    <h1>🧪 Real API Test - Production Server</h1>
    <p><strong>Testing:</strong> http://124.40.244.211/netmon-iptv/cabletvapis/chnl_list</p>

    <button onclick="testRealAPI()">Test Real API (Production)</button>
    <button onclick="testParsingLogic()">Test Parsing Logic with Sample Data</button>
    <button onclick="clearCache()">Clear Cache & Reload</button>

    <div id="result" class="result"></div>

    <script src="js/api.js"></script>
    <script>
        async function testRealAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p class="info">⏳ Testing real API...</p>';

            try {
                // Direct fetch to production server
                const url = 'http://124.40.244.211/netmon-iptv/cabletvapis/chnl_list';
                const payload = {
                    userid: "testiser1",
                    mobile: "7800000001",
                    langid: "9",
                    grid: "",
                    bcid: "",
                    search: ""
                };

                console.log("[TEST] URL:", url);
                console.log("[TEST] Payload:", payload);

                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Basic Zm9maWxhYkBnbWFpbC5jb206MTIzNDUtNTQzMjE=',
                        'devmac': '26:F2:AE:D8:3F:99',
                        'devslno': 'FOFI20191129000336'
                    },
                    body: JSON.stringify(payload)
                });

                console.log("[TEST] Response Status:", response.status);

                const data = await response.json();
                console.log("[TEST] Response Data:", data);

                // Parse using same logic as api.js
                let channels = [];
                if (data && data.body && Array.isArray(data.body)) {
                    if (data.body.length > 0 && data.body[0].channels) {
                        channels = data.body[0].channels;
                    }
                }

                if (channels.length > 0) {
                    resultDiv.innerHTML = `
                        <p class="success">✅ SUCCESS: Received ${channels.length} channels from real API!</p>
                        <p><strong>First 3 Channels:</strong></p>
                        <div class="channel-grid">
                            ${channels.slice(0, 3).map(ch => `
                                <div class="channel-card">
                                    <strong>${ch.chtitle}</strong><br>
                                    Channel ${ch.chno}<br>
                                    Grid: ${ch.grid}<br>
                                    Lang: ${ch.langid}<br>
                                    Subscribed: ${ch.subscribed}
                                </div>
                            `).join('')}
                        </div>
                        <p><strong>Response Structure:</strong></p>
                        <pre>${JSON.stringify({
                            hasBody: !!data.body,
                            bodyLength: data.body ? data.body.length : 0,
                            hasChannels: data.body && data.body[0] && !!data.body[0].channels,
                            channelsCount: channels.length,
                            hasStatus: !!data.status,
                            statusCode: data.status ? data.status.err_code : 'N/A'
                        }, null, 2)}</pre>
                        <p><strong>Full Response (first 5 channels):</strong></p>
                        <pre>${JSON.stringify({...data, body: [{...data.body[0], channels: data.body[0].channels.slice(0, 5)}]}, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <p class="error">❌ No channels parsed from response</p>
                        <p><strong>Response Structure:</strong></p>
                        <pre>${JSON.stringify(data, null, 2).substring(0, 1000)}...</pre>
                    `;
                }

            } catch (error) {
                console.error("[TEST] Error:", error);
                resultDiv.innerHTML = `
                    <p class="error">❌ ERROR: ${error.message}</p>
                    <p>Check browser console for details</p>
                    <pre>${error.stack}</pre>
                `;
            }
        }

        function testParsingLogic() {
            const resultDiv = document.getElementById('result');

            // Sample response matching the format you showed
            const sampleResponse = {
                "body": [{
                    "channels": [
                        {
                            "chid": "1907",
                            "chtitle": "Fo-Fi Info",
                            "grid": "1",
                            "langid": "33",
                            "subscribed": "false"
                        },
                        {
                            "chid": "1873",
                            "chtitle": "DD CHANDANA",
                            "grid": "3",
                            "langid": "9",
                            "subscribed": "true"
                        }
                    ]
                }]
            };

            // Parse using same logic as api.js
            let channels = [];
            if (sampleResponse && sampleResponse.body && Array.isArray(sampleResponse.body)) {
                if (sampleResponse.body.length > 0 && sampleResponse.body[0].channels) {
                    channels = sampleResponse.body[0].channels;
                }
            }

            resultDiv.innerHTML = `
                <p class="success">✅ Parsing Logic Test</p>
                <p><strong>Input:</strong></p>
                <pre>${JSON.stringify(sampleResponse, null, 2)}</pre>
                <p><strong>Parsed Channels:</strong> ${channels.length}</p>
                <pre>${JSON.stringify(channels, null, 2)}</pre>
                <p class="success">✅ Parsing works correctly!</p>
            `;
        }

        function clearCache() {
            if (confirm('Clear browser cache and reload?')) {
                location.reload(true);
            }
        }
    </script>
</body>
</html>
