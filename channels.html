<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, user-scalable=no">
    <title>Fo-Fi TV - Channels</title>
    <!-- Base Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages/channels.css">
    <script type="text/javascript" src="$WEBAPIS/webapis/webapis.js"></script>
</head>

<body class="channels-page">

    <!-- Fixed Header -->
    <div class="channels-header">
        <button class="back-btn focusable" tabindex="0">
            <span class="back-icon">←</span>
        </button>
        <h1 class="page-title">TV Channels</h1>
        <!-- Search Bar (Same style as Home page) -->
        <div class="search-bar">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" class="search-input focusable" tabindex="0" placeholder="Search Channels..." id="searchInput">
        </div>
    </div>

    <!-- Category Pills - Below Header -->
    <div class="category-section">
        <div class="category-pills" id="categoryPills">
            <!-- Categories will be loaded dynamically from API -->
            <button class="category-pill language-pill focusable" tabindex="0" id="languagePill">
                <span>Language</span>
                <svg class="pill-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <!-- Main Content Area / Channel Grid -->
    <div id="channel-grid-container" class="subpage-section">
        <!-- Channels will be loaded here dynamically -->
        <div class="loading-spinner">Loading Channels...</div>
    </div>

    <!-- Error Popup - No Channels -->
    <div class="error-popup-overlay" id="noChannelsPopup" style="display: none;">
        <div class="error-popup">
            <div class="error-popup-image">
                <svg width="180" height="140" viewBox="0 0 180 140">
                    <!-- TV -->
                    <rect x="40" y="20" width="100" height="70" rx="8" fill="#e8e8e8" stroke="#ccc" stroke-width="2" />
                    <rect x="50" y="30" width="80" height="50" rx="4" fill="#f5f5f5" />
                    <text x="90" y="52" text-anchor="middle" fill="#999" font-size="10">No channels</text>
                    <text x="90" y="65" text-anchor="middle" fill="#999" font-size="10">available</text>
                    <!-- TV Stand -->
                    <line x1="70" y1="90" x2="60" y2="105" stroke="#999" stroke-width="3" />
                    <line x1="110" y1="90" x2="120" y2="105" stroke="#999" stroke-width="3" />
                    <!-- Cat -->
                    <ellipse cx="150" cy="115" rx="20" ry="18" fill="#333" />
                    <circle cx="145" cy="108" r="3" fill="#4CAF50" />
                    <circle cx="155" cy="108" r="3" fill="#4CAF50" />
                    <polygon points="140,95 145,105 135,105" fill="#333" />
                    <polygon points="160,95 165,105 155,105" fill="#333" />
                    <path d="M145,118 Q150,122 155,118" stroke="#fff" stroke-width="2" fill="none" />
                </svg>
            </div>
            <h2 class="error-popup-title">No Channels Available</h2>
            <p class="error-popup-message">Please Check your network and try again</p>
            <button class="error-popup-btn focusable" id="retryChannelsBtn" tabindex="0">Try Again</button>
        </div>
    </div>

    <!-- Error Popup - No Internet -->
    <div class="error-popup-overlay" id="noInternetPopup" style="display: none;">
        <div class="error-popup">
            <div class="error-popup-image">
                <svg width="200" height="140" viewBox="0 0 200 140">
                    <!-- Monitor -->
                    <rect x="50" y="15" width="100" height="65" rx="5" fill="#2d5a45" stroke="#3d7a55"
                        stroke-width="2" />
                    <text x="100" y="40" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">NO
                        INTERNET</text>
                    <text x="100" y="55" text-anchor="middle" fill="#fff" font-size="11"
                        font-weight="bold">CONNECTION</text>
                    <!-- Warning icons -->
                    <circle cx="75" cy="68" r="6" fill="#f5a623" />
                    <text x="75" y="71" text-anchor="middle" fill="#333" font-size="10" font-weight="bold">!</text>
                    <circle cx="125" cy="68" r="6" fill="#f5a623" />
                    <text x="125" y="71" text-anchor="middle" fill="#333" font-size="10" font-weight="bold">!</text>
                    <!-- Stand -->
                    <rect x="90" y="80" width="20" height="10" fill="#3d7a55" />
                    <!-- Dog -->
                    <ellipse cx="45" cy="115" rx="25" ry="20" fill="#d4a534" />
                    <circle cx="35" cy="105" r="4" fill="#333" />
                    <circle cx="50" cy="105" r="4" fill="#333" />
                    <ellipse cx="42" cy="115" rx="5" ry="4" fill="#333" />
                    <ellipse cx="30" cy="90" rx="8" ry="12" fill="#d4a534" />
                    <ellipse cx="55" cy="90" rx="8" ry="12" fill="#d4a534" />
                    <!-- Cat -->
                    <ellipse cx="155" cy="115" rx="20" ry="18" fill="#888" />
                    <circle cx="148" cy="108" r="3" fill="#4CAF50" />
                    <circle cx="162" cy="108" r="3" fill="#4CAF50" />
                    <polygon points="143,95 148,105 138,105" fill="#888" />
                    <polygon points="167,95 172,105 162,105" fill="#888" />
                </svg>
            </div>
            <h2 class="error-popup-title">No Internet Connection</h2>
            <p class="error-popup-message">Please Check your network and try again</p>
            <button class="error-popup-btn focusable" id="retryInternetBtn" tabindex="0">Try Again</button>
        </div>
    </div>

    <!-- Specific JS for this page -->
    <script src="js/api.js"></script>
    <script src="js/channels.js"></script>
</body>

</html>
