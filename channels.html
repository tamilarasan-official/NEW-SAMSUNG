<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, user-scalable=no">
    <title>Fo-Fi TV - Channels</title>
    <!-- Base Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages/channels.css">
    <script type="text/javascript" src="$WEBAPIS/webapis/webapis.js"></script>
</head>

<body class="channels-page">

    <!-- Fixed Header -->
    <div class="channels-header">
        <button class="back-btn focusable" tabindex="0">
            <span class="back-icon">←</span>
        </button>
        <h1 class="page-title">TV Channels</h1>
        <!-- Search Bar (Same style as Home page) -->
        <div class="search-bar">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="tel" class="search-input focusable" tabindex="0" placeholder="Enter Channel Number..." id="searchInput" inputmode="numeric" pattern="[0-9]*">
        </div>
    </div>

    <!-- Category Pills - Below Header -->
    <div class="category-section">
        <div class="category-pills" id="categoryPills">
            <!-- Categories will be loaded dynamically from API -->
            <button class="category-pill language-pill focusable" tabindex="0" id="languagePill">
                <span>Language</span>
                <svg class="pill-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <!-- Main Content Area / Channel Grid -->
    <div id="channel-grid-container" class="subpage-section">
        <!-- Channels will be loaded here dynamically -->
        <div class="loading-spinner">Loading Channels...</div>
    </div>

    <!-- Error Popup - No Channels -->
    <div class="error-popup-overlay" id="noChannelsPopup" style="display: none;">
        <div class="error-popup">
            <div class="error-popup-image">
                <svg width="240" height="180" viewBox="0 0 240 180">
                    <!-- TV Monitor -->
                    <rect x="55" y="15" width="130" height="90" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="2"/>
                    <rect x="65" y="25" width="110" height="65" rx="4" fill="#e8e8e8"/>
                    <text x="120" y="53" text-anchor="middle" fill="#999" font-size="10">No channels</text>
                    <text x="120" y="67" text-anchor="middle" fill="#999" font-size="10">available</text>
                    <!-- TV Antenna -->
                    <line x1="100" y1="15" x2="85" y2="2" stroke="#888" stroke-width="2"/>
                    <line x1="140" y1="15" x2="155" y2="2" stroke="#888" stroke-width="2"/>
                    <!-- TV Stand -->
                    <rect x="100" y="105" width="40" height="6" fill="#ccc" rx="2"/>
                    <rect x="90" y="111" width="60" height="4" fill="#ddd" rx="2"/>
                    <!-- Cat -->
                    <ellipse cx="195" cy="145" rx="28" ry="24" fill="#333"/>
                    <circle cx="195" cy="118" r="18" fill="#333"/>
                    <polygon points="180,108 183,92 190,108" fill="#333"/>
                    <polygon points="200,108 207,92 210,108" fill="#333"/>
                    <polygon points="183,105 185,96 189,105" fill="#ffb6c1"/>
                    <polygon points="201,105 205,96 207,105" fill="#ffb6c1"/>
                    <circle cx="188" cy="115" r="3" fill="#4CAF50"/>
                    <circle cx="202" cy="115" r="3" fill="#4CAF50"/>
                    <ellipse cx="195" cy="122" rx="3" ry="2" fill="#e74c3c"/>
                    <path d="M189,126 Q195,130 201,126" stroke="#fff" stroke-width="1.5" fill="none"/>
                    <line x1="175" y1="120" x2="187" y2="121" stroke="#666" stroke-width="1"/>
                    <line x1="175" y1="124" x2="187" y2="123" stroke="#666" stroke-width="1"/>
                    <line x1="203" y1="121" x2="215" y2="120" stroke="#666" stroke-width="1"/>
                    <line x1="203" y1="123" x2="215" y2="124" stroke="#666" stroke-width="1"/>
                    <path d="M220,140 Q235,130 228,115" stroke="#333" stroke-width="5" fill="none" stroke-linecap="round"/>
                    <line x1="180" y1="145" x2="165" y2="120" stroke="#666" stroke-width="2"/>
                    <circle cx="165" cy="118" r="3" fill="#555"/>
                </svg>
            </div>
            <h2 class="error-popup-title">No Channels Available</h2>
            <p class="error-popup-message">Please Check your network and try again</p>
            <button class="error-popup-btn focusable" id="retryChannelsBtn" tabindex="0">Try Again</button>
        </div>
    </div>

    <!-- Error Popup - No Internet / Failed to Load -->
    <div class="error-popup-overlay" id="noInternetPopup" style="display: none;">
        <div class="error-popup">
            <div class="error-popup-image">
                <svg width="320" height="200" viewBox="0 0 320 200">
                    <!-- Monitor -->
                    <rect x="80" y="15" width="160" height="105" rx="10" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
                    <rect x="80" y="15" width="160" height="25" rx="10" fill="#2d6a4f"/>
                    <rect x="80" y="30" width="160" height="10" fill="#2d6a4f"/>
                    <text x="160" y="33" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">FAILED TO LOAD CHANNELS</text>
                    <rect x="95" y="50" width="130" height="55" rx="4" fill="#e8e8e8"/>
                    <text x="160" y="72" text-anchor="middle" fill="#888" font-size="10">No channels</text>
                    <text x="160" y="86" text-anchor="middle" fill="#888" font-size="10">available</text>
                    <circle cx="210" cy="45" r="12" fill="#f5a623"/>
                    <text x="210" y="50" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">!</text>
                    <rect x="145" y="120" width="30" height="8" fill="#ccc" rx="2"/>
                    <rect x="130" y="128" width="60" height="5" fill="#ddd" rx="2"/>
                    <!-- Dog (left) -->
                    <ellipse cx="65" cy="155" rx="28" ry="22" fill="#c8913e"/>
                    <circle cx="65" cy="130" r="18" fill="#c8913e"/>
                    <ellipse cx="52" cy="120" rx="7" ry="10" fill="#c8913e"/>
                    <ellipse cx="78" cy="120" rx="7" ry="10" fill="#c8913e"/>
                    <circle cx="58" cy="128" r="3" fill="#333"/>
                    <circle cx="72" cy="128" r="3" fill="#333"/>
                    <ellipse cx="65" cy="135" rx="4" ry="3" fill="#333"/>
                    <path d="M58,140 Q65,146 72,140" stroke="#333" stroke-width="1.5" fill="none"/>
                    <!-- Cat (right) -->
                    <ellipse cx="255" cy="155" rx="25" ry="22" fill="#d48a3e"/>
                    <circle cx="255" cy="130" r="16" fill="#d48a3e"/>
                    <polygon points="240,120 244,108 250,120" fill="#d48a3e"/>
                    <polygon points="260,120 266,108 270,120" fill="#d48a3e"/>
                    <circle cx="248" cy="128" r="3" fill="#333"/>
                    <circle cx="262" cy="128" r="3" fill="#333"/>
                    <ellipse cx="255" cy="134" rx="3" ry="2" fill="#ff9999"/>
                    <line x1="240" y1="150" x2="225" y2="135" stroke="#666" stroke-width="2"/>
                    <circle cx="225" cy="135" r="4" fill="#666"/>
                </svg>
            </div>
            <h2 class="error-popup-title">Failed to Load Channels</h2>
            <p class="error-popup-message">Please Check your network and try again</p>
            <button class="error-popup-btn focusable" id="retryInternetBtn" tabindex="0">Try Again</button>
        </div>
    </div>

    <!-- Specific JS for this page -->
    <script src="js/api.js"></script>
    <script src="js/channels.js"></script>
</body>

</html>
