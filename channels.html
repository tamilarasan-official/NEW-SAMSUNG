<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, user-scalable=no">
    <!-- CSP for Samsung Tizen widget - allow fetch from any origin for image loading -->
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; img-src * data: blob:; connect-src * data: blob:;">
    <title>Fo-Fi TV - Channels</title>
    <!-- Base Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages/channels.css">
    <script type="text/javascript" src="$WEBAPIS/webapis/webapis.js"></script>
</head>

<body class="channels-page channels-page-pills">

    <!-- Main Content Area (Full Width - No Sidebar) -->
    <div class="channels-main channels-main-fullwidth">
        <!-- Fixed Header -->
        <div class="channels-header">
            <button class="back-btn focusable" tabindex="0">
                <span class="back-icon">←</span>
            </button>
            <h1 class="page-title">TV Channels</h1>
            <!-- Search Bar (Same style as Home page) -->
            <div class="search-bar">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="tel" class="search-input focusable" tabindex="0" placeholder="Enter Channel Number..." inputmode="numeric" pattern="[0-9]*" autocomplete="off" id="searchInput">
            </div>
        </div>

        <!-- Language Pills Row - Below Header -->
        <div class="category-section">
            <div class="category-pills" id="languagePillsRow">
                <!-- Language pills loaded dynamically from API -->
            </div>
        </div>

        <!-- Main Content Area / Channel Grid -->
        <div id="channel-grid-container" class="subpage-section">
            <!-- Channels will be loaded here dynamically -->
            <div class="loading-spinner">Loading Channels...</div>
        </div>
    </div>

    <!-- Hidden Sidebar (for compatibility - not displayed) -->
    <aside class="channels-sidebar" id="channelsSidebar" style="display: none;">
        <div class="sidebar-header">
            <h2 class="sidebar-title">Categories</h2>
        </div>
        <div class="sidebar-divider"></div>
        <div class="language-selector" id="languageSelector">
            <button class="lang-arrow lang-arrow-left focusable" tabindex="-1" id="langArrowLeft">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <span class="selected-language focusable" tabindex="-1" id="selectedLanguageText">All Languages</span>
            <button class="lang-arrow lang-arrow-right focusable" tabindex="-1" id="langArrowRight">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </div>
        <div class="sidebar-divider"></div>
        <div class="category-list" id="categoryList">
            <div class="category-loading">Loading...</div>
        </div>
    </aside>

    <!-- Error Popup - No Channels -->
    <div class="error-popup-overlay" id="noChannelsPopup" style="display: none;">
        <div class="error-popup">
            <div class="error-popup-image">
                <img id="errorImg_noChannels" src="" alt="No channels available" crossorigin="anonymous">
            </div>
            <h2 class="error-popup-title">No Channels Available</h2>
            <p class="error-popup-message">Please Check your network and try again</p>
            <button class="error-popup-btn focusable" id="retryChannelsBtn" tabindex="0">Try Again</button>
        </div>
    </div>

    <!-- Error Popup - No Internet / Failed to Load -->
    <div class="error-popup-overlay" id="noInternetPopup" style="display: none;">
        <div class="error-popup">
            <div class="error-popup-image">
                <img id="errorImg_noInternet" src="" alt="No internet connection" crossorigin="anonymous">
            </div>
            <h2 class="error-popup-title">Failed to Load Channels</h2>
            <p class="error-popup-message">Please Check your network and try again</p>
            <button class="error-popup-btn focusable" id="retryInternetBtn" tabindex="0">Try Again</button>
        </div>
    </div>

    <!-- Specific JS for this page -->
    <script src="js/api.js" defer></script>
    <script src="js/channels.js" defer></script>
</body>

</html>
