<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, user-scalable=no">
    <title>BBNL - TV Channels</title>
    <!-- Base Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages/channels-enhanced.css">
    <script type="text/javascript" src="$WEBAPIS/webapis/webapis.js"></script>
</head>

<body class="channels-page">

    <!-- Header -->
    <div class="subpage-header">
        <div class="header-left">
            <button class="back-btn focusable" tabindex="0">
                <span>‹</span> Back
            </button>
        </div>

        <div class="header-right">
            <div class="subpage-search">
                <span>🔍</span>
                <input type="text" placeholder="Search Channels" class="focusable" tabindex="0">
            </div>
        </div>
    </div>

    <!-- Page Title Row -->
    <div class="page-title-container" style="padding: 0 48px; margin-top: 10px;">
        <div class="page-title">TV Channels</div>
    </div>

    <!-- Filter Bar / Categories -->
    <div id="category-container" class="filters-bar">
        <!-- Categories will be loaded here dynamically -->
        <div class="loading-spinner">Loading Categories...</div>
    </div>

    <!-- Main Content Area / Channel Grid -->
    <div id="channel-grid-container" class="subpage-section">
        <!-- Channels will be loaded here dynamically -->
        <div class="loading-spinner">Loading Channels...</div>
    </div>

    <!-- Specific JS for this page -->
    <!-- Specific JS for this page -->
    <script src="js/api.js"></script>
    <script src="js/channels.js"></script>
</body>

</html>
