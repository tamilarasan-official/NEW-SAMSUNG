<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; img-src * data: blob:; connect-src * data: blob:;">
    <title>BBNL IPTV</title>
    <script>
        // Entry router — login.html is ONLY for first-time or after logout (hasLoggedInOnce cleared).
        // If the user has ever logged in on this device, never open the login UI while TV storage is slow: wait until session reads, then home.
        (function () {
            try {
                var RELAUNCH_POLL_MS = 200;
                var FIRST_INSTALL_WAIT_MS = 1500;
                var RELAUNCH_RECOVERY_WAIT_MS = 15000;

                function readEverLoginCookie() {
                    try {
                        var m = document.cookie.match(/(?:^|;\s*)bbnl_has_logged_in_once=([^;]+)/);
                        return !!(m && decodeURIComponent(m[1]) === '1');
                    } catch (e) {
                        return false;
                    }
                }

                function writeEverLoginCookie(on) {
                    try {
                        if (on) {
                            document.cookie = 'bbnl_has_logged_in_once=1; path=/; max-age=315360000; SameSite=Lax';
                        } else {
                            document.cookie = 'bbnl_has_logged_in_once=; path=/; max-age=0; SameSite=Lax';
                        }
                    } catch (e) {}
                }

                function normalizeStoredUser(obj) {
                    if (!obj || typeof obj !== 'object') return null;
                    var uid = obj.userid != null && String(obj.userid).trim() !== '' ? String(obj.userid).trim()
                        : (obj.userId != null && String(obj.userId).trim() !== '' ? String(obj.userId).trim() : '');
                    if (!uid) return null;
                    if (!obj.userid) obj.userid = uid;
                    return obj;
                }

                function readResolvedUser() {
                    var primaryRaw = localStorage.getItem("bbnl_user");
                    var backupRaw = localStorage.getItem("bbnl_user_backup");
                    var primaryUser = null;
                    var backupUser = null;

                    if (primaryRaw) {
                        try {
                            primaryUser = normalizeStoredUser(JSON.parse(primaryRaw));
                        } catch (e1) {}
                    }
                    if (backupRaw) {
                        try {
                            backupUser = normalizeStoredUser(JSON.parse(backupRaw));
                        } catch (e2) {}
                    }

                    var resolvedUser = primaryUser || backupUser;
                    if (!resolvedUser) return null;

                    var resolvedJson = JSON.stringify(resolvedUser);
                    if (primaryRaw !== resolvedJson) localStorage.setItem("bbnl_user", resolvedJson);
                    if (backupRaw !== resolvedJson) localStorage.setItem("bbnl_user_backup", resolvedJson);
                    if (localStorage.getItem("hasLoggedInOnce") !== "true") {
                        localStorage.setItem("hasLoggedInOnce", "true");
                    }
                    writeEverLoginCookie(true);
                    if (localStorage.getItem('bbnl_logged_out') === '1') {
                        localStorage.removeItem('bbnl_logged_out');
                    }
                    return resolvedUser;
                }

                function readAuthFlags() {
                    var hadSessionFlag = localStorage.getItem('hasLoggedInOnce') === 'true' || readEverLoginCookie();
                    if (hadSessionFlag && localStorage.getItem('hasLoggedInOnce') !== 'true') {
                        try { localStorage.setItem('hasLoggedInOnce', 'true'); } catch (e) {}
                    }
                    return {
                        relaunchPending: localStorage.getItem('bbnl_relaunch_pending') === '1',
                        hadSessionBefore: hadSessionFlag,
                        explicitLogout: localStorage.getItem('bbnl_logged_out') === '1'
                    };
                }

                function goHome() {
                    try { localStorage.removeItem('bbnl_relaunch_pending'); } catch (e) {}
                    window.location.replace("home.html");
                }

                /** Login UI + login scripts only when never logged in (first install or Settings logout cleared storage). */
                function goLogin() {
                    try { localStorage.removeItem('bbnl_relaunch_pending'); } catch (e) {}
                    window.location.replace("login.html");
                }

                var resolvedUser = readResolvedUser();
                if (resolvedUser) {
                    goHome();
                    return;
                }

                var flags = readAuthFlags();
                if (flags.explicitLogout) {
                    goLogin();
                    return;
                }

                // Returning users should never see login on relaunch unless explicit logout was requested.
                // Keep retrying longer on slow TVs so bbnl_user has time to load.
                if (flags.hadSessionBefore || flags.relaunchPending) {
                    var relaunchWaited = 0;
                    var waitForSessionOnRelaunch = function () {
                        var relaunchUser = readResolvedUser();
                        if (relaunchUser) {
                            goHome();
                            return;
                        }

                        relaunchWaited += RELAUNCH_POLL_MS;
                        if (relaunchWaited < RELAUNCH_RECOVERY_WAIT_MS) {
                            setTimeout(waitForSessionOnRelaunch, RELAUNCH_POLL_MS);
                            return;
                        }

                        // If storage never recovers, still go home for returning users.
                        goHome();
                    };

                    setTimeout(waitForSessionOnRelaunch, RELAUNCH_POLL_MS);
                    return;
                }

                // First-install path only: wait a bit, then show login.
                setTimeout(function () {
                    var latestFlags = readAuthFlags();
                    if (latestFlags.explicitLogout) {
                        goLogin();
                        return;
                    }
                    if (readResolvedUser()) {
                        goHome();
                        return;
                    }
                    if (latestFlags.hadSessionBefore || latestFlags.relaunchPending) {
                        goHome();
                        return;
                    }
                    goLogin();
                }, FIRST_INSTALL_WAIT_MS);
            } catch (e) {
                try {
                    var cookieEverLoggedIn = false;
                    try {
                        var cookieMatch = document.cookie.match(/(?:^|;\s*)bbnl_has_logged_in_once=([^;]+)/);
                        cookieEverLoggedIn = !!(cookieMatch && decodeURIComponent(cookieMatch[1]) === '1');
                    } catch (eCookieFallback) {}
                    if (localStorage.getItem('bbnl_logged_out') === '1') {
                        window.location.replace('login.html');
                    } else if (localStorage.getItem('hasLoggedInOnce') === 'true' || cookieEverLoggedIn) {
                        window.location.replace('home.html');
                    } else {
                        window.location.replace('login.html');
                    }
                } catch (e2) {}
            }
        })();
    </script>
</head>

<body>
    <p style="margin:0;padding:24px;font-family:sans-serif;color:#888;">Starting…</p>
</body>

</html>
