<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; img-src * data: blob:; connect-src * data: blob:;">
    <!-- No meta refresh — JS handles all routing -->
    <title>Redirecting...</title>
    <script>
        // Enhanced redirect engine: bypass login whenever session is found
        (function () {
            try {
                var udRaw = localStorage.getItem("bbnl_user");
                var backupRaw = localStorage.getItem("bbnl_user_backup");

                var user = null;
                var backupUser = null;

                if (udRaw) {
                    try {
                        var parsedPrimary = JSON.parse(udRaw);
                        if (parsedPrimary && parsedPrimary.userid) user = parsedPrimary;
                    } catch (e1) {}
                }

                if (backupRaw) {
                    try {
                        var parsedBackup = JSON.parse(backupRaw);
                        if (parsedBackup && parsedBackup.userid) backupUser = parsedBackup;
                    } catch (e2) {}
                }

                var resolvedUser = user || backupUser;
                if (resolvedUser) {
                    var resolvedJson = JSON.stringify(resolvedUser);
                    localStorage.setItem("bbnl_user", resolvedJson);
                    localStorage.setItem("bbnl_user_backup", resolvedJson);
                    localStorage.setItem("hasLoggedInOnce", "true");
                    window.location.replace("home.html");
                    return;
                }
            } catch (e) {
            }
            window.location.replace('login.html');
        })();
    </script>
</head>

<body>
    <p>Redirecting to login...</p>
</body>

</html>
