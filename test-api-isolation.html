<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Isolation Test - BBNL IPTV</title>
    <style>
        body {
            font-family: 'Consolas', 'Monaco', monospace;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        h1 {
            color: #4ec9b0;
            border-bottom: 2px solid #4ec9b0;
            padding-bottom: 10px;
        }
        h2 {
            color: #569cd6;
            margin-top: 30px;
        }
        .test-section {
            background: #252526;
            padding: 15px;
            margin: 15px 0;
            border-left: 4px solid #007acc;
            border-radius: 4px;
        }
        .test-result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .test-result.pass {
            background: #1e3a1e;
            border-left: 4px solid #4ec9b0;
            color: #4ec9b0;
        }
        .test-result.fail {
            background: #3a1e1e;
            border-left: 4px solid #f48771;
            color: #f48771;
        }
        .test-result.info {
            background: #1e2a3a;
            border-left: 4px solid #569cd6;
            color: #569cd6;
        }
        pre {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
        .icon {
            display: inline-block;
            width: 20px;
            font-weight: bold;
        }
        button {
            background: #007acc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover {
            background: #005a9e;
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        #results {
            margin-top: 20px;
        }
        .summary {
            background: #252526;
            padding: 20px;
            margin: 20px 0;
            border-radius: 4px;
            font-size: 18px;
        }
        .summary.pass {
            border: 2px solid #4ec9b0;
        }
        .summary.fail {
            border: 2px solid #f48771;
        }
    </style>
</head>
<body>
    <h1>🧪 API Isolation Test Suite</h1>
    <p>This test verifies that the Ads API doesn't interfere with other APIs (Auth, Channels, etc.)</p>

    <div>
        <button onclick="runAllTests()">▶ Run All Tests</button>
        <button onclick="clearResults()">🗑️ Clear Results</button>
    </div>

    <div id="results"></div>

    <script src="js/api.js"></script>
    <script>
        let testResults = [];
        let passCount = 0;
        let failCount = 0;

        function log(message, type = 'info') {
            const result = { message, type };
            testResults.push(result);

            const resultsDiv = document.getElementById('results');
            const resultDiv = document.createElement('div');
            resultDiv.className = 'test-result ' + type;

            const icon = type === 'pass' ? '✅' : type === 'fail' ? '❌' : 'ℹ️';
            resultDiv.innerHTML = `<span class="icon">${icon}</span> ${message}`;

            resultsDiv.appendChild(resultDiv);

            if (type === 'pass') passCount++;
            if (type === 'fail') failCount++;
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
            testResults = [];
            passCount = 0;
            failCount = 0;
        }

        function addSection(title) {
            const resultsDiv = document.getElementById('results');
            const section = document.createElement('div');
            section.className = 'test-section';
            section.innerHTML = `<h2>${title}</h2>`;
            resultsDiv.appendChild(section);
            return section;
        }

        async function runAllTests() {
            clearResults();

            try {
                // Section 1: API Object Existence
                addSection('1️⃣ API Object Existence Tests');
                testAPIObjectsExist();

                // Section 2: API Independence
                addSection('2️⃣ API Independence Tests');
                testAPIIndependence();

                // Section 3: Global Namespace
                addSection('3️⃣ Global Namespace Tests');
                testGlobalNamespace();

                // Section 4: Configuration Integrity
                addSection('4️⃣ Configuration Integrity Tests');
                testConfigurationIntegrity();

                // Section 5: Method Binding
                addSection('5️⃣ Method Binding Tests');
                testMethodBinding();

                // Section 6: Headers and Endpoints
                addSection('6️⃣ Headers and Endpoints Tests');
                testHeadersAndEndpoints();

                // Summary
                addSection('📊 Test Summary');
                showSummary();

            } catch (error) {
                log('Critical error during tests: ' + error.message, 'fail');
            }
        }

        function testAPIObjectsExist() {
            // Test that all API objects exist
            const objects = [
                'BBNL_API',
                'AuthAPI',
                'ChannelsAPI',
                'AdsAPI',
                'DeviceInfo'
            ];

            objects.forEach(obj => {
                if (typeof window[obj] !== 'undefined') {
                    log(`${obj} exists in global scope`, 'pass');
                } else {
                    log(`${obj} NOT found in global scope`, 'fail');
                }
            });
        }

        function testAPIIndependence() {
            // Test that AdsAPI doesn't override other API methods

            // Check AuthAPI methods
            const authMethods = ['requestOTP', 'verifyOTP', 'getUserData', 'setSession', 'logout'];
            authMethods.forEach(method => {
                if (typeof AuthAPI[method] === 'function') {
                    log(`AuthAPI.${method}() is still accessible`, 'pass');
                } else {
                    log(`AuthAPI.${method}() is MISSING or corrupted`, 'fail');
                }
            });

            // Check ChannelsAPI methods
            const channelMethods = ['getChannelData', 'getCategories', 'getChannelList'];
            channelMethods.forEach(method => {
                if (typeof ChannelsAPI[method] === 'function') {
                    log(`ChannelsAPI.${method}() is still accessible`, 'pass');
                } else {
                    log(`ChannelsAPI.${method}() is MISSING or corrupted`, 'fail');
                }
            });

            // Check AdsAPI methods
            const adsMethods = ['getIPTVAds', 'getHomeAds', 'getChannelListAds', 'getVideoAds'];
            adsMethods.forEach(method => {
                if (typeof AdsAPI[method] === 'function') {
                    log(`AdsAPI.${method}() exists and is accessible`, 'pass');
                } else {
                    log(`AdsAPI.${method}() is MISSING`, 'fail');
                }
            });
        }

        function testGlobalNamespace() {
            // Test that BBNL_API exposes all methods correctly

            // Auth methods
            if (typeof BBNL_API.requestOTP === 'function') {
                log('BBNL_API.requestOTP() available', 'pass');
            } else {
                log('BBNL_API.requestOTP() MISSING', 'fail');
            }

            // Channel methods
            if (typeof BBNL_API.getChannelList === 'function') {
                log('BBNL_API.getChannelList() available', 'pass');
            } else {
                log('BBNL_API.getChannelList() MISSING', 'fail');
            }

            // Ads methods (NEW)
            const adsMethodsInBBNL = ['getIPTVAds', 'getHomeAds', 'getChannelListAds', 'getVideoAds'];
            adsMethodsInBBNL.forEach(method => {
                if (typeof BBNL_API[method] === 'function') {
                    log(`BBNL_API.${method}() available`, 'pass');
                } else {
                    log(`BBNL_API.${method}() MISSING`, 'fail');
                }
            });
        }

        function testConfigurationIntegrity() {
            // Test that API_ENDPOINTS are intact
            const endpoints = [
                'LOGIN',
                'RESEND_OTP',
                'CHANNEL_LIST',
                'CHANNEL_CATEGORIES',
                'IPTV_ADS'
            ];

            endpoints.forEach(endpoint => {
                if (typeof API_ENDPOINTS[endpoint] === 'string' && API_ENDPOINTS[endpoint].length > 0) {
                    log(`API_ENDPOINTS.${endpoint} = "${API_ENDPOINTS[endpoint]}"`, 'pass');
                } else {
                    log(`API_ENDPOINTS.${endpoint} is INVALID or MISSING`, 'fail');
                }
            });

            // Test DEFAULT_HEADERS integrity
            const requiredHeaders = ['Content-Type', 'Authorization', 'devmac', 'devslno'];
            requiredHeaders.forEach(header => {
                if (DEFAULT_HEADERS[header]) {
                    log(`DEFAULT_HEADERS["${header}"] exists`, 'pass');
                } else {
                    log(`DEFAULT_HEADERS["${header}"] MISSING`, 'fail');
                }
            });
        }

        function testMethodBinding() {
            // Test that methods are properly bound
            try {
                // Try calling getUserData (should not throw binding error)
                const userData = AuthAPI.getUserData();
                log('AuthAPI.getUserData() executes without binding error', 'pass');

                // Test via BBNL_API
                const userData2 = BBNL_API.getUserData();
                log('BBNL_API.getUserData() executes without binding error', 'pass');

            } catch (error) {
                log('Method binding error: ' + error.message, 'fail');
            }
        }

        function testHeadersAndEndpoints() {
            // Verify ads endpoint format
            const adsEndpoint = API_ENDPOINTS.IPTV_ADS;

            if (adsEndpoint.includes('/iptvads')) {
                log('Ads endpoint includes "/iptvads"', 'pass');
            } else {
                log('Ads endpoint WRONG format: ' + adsEndpoint, 'fail');
            }

            // Verify it uses correct base URL
            const expectedBase = 'http://124.40.244.211/netmon/cabletvapis';
            const expectedProxy = 'http://localhost:3000';

            if (adsEndpoint.startsWith(expectedBase) || adsEndpoint.startsWith(expectedProxy)) {
                log('Ads endpoint uses correct base URL', 'pass');
            } else {
                log('Ads endpoint uses UNEXPECTED base URL', 'fail');
            }

            // Check that other endpoints aren't affected
            const loginEndpoint = API_ENDPOINTS.LOGIN;
            if (loginEndpoint.includes('/login')) {
                log('Login endpoint unchanged: ' + loginEndpoint, 'pass');
            } else {
                log('Login endpoint CORRUPTED: ' + loginEndpoint, 'fail');
            }

            const channelEndpoint = API_ENDPOINTS.CHANNEL_LIST;
            if (channelEndpoint.includes('/chnl_list')) {
                log('Channel endpoint unchanged: ' + channelEndpoint, 'pass');
            } else {
                log('Channel endpoint CORRUPTED: ' + channelEndpoint, 'fail');
            }
        }

        function showSummary() {
            const total = passCount + failCount;
            const percentage = total > 0 ? Math.round((passCount / total) * 100) : 0;

            const summaryDiv = document.createElement('div');
            summaryDiv.className = 'summary ' + (failCount === 0 ? 'pass' : 'fail');

            summaryDiv.innerHTML = `
                <div style="font-size: 24px; margin-bottom: 15px;">
                    ${failCount === 0 ? '✅ ALL TESTS PASSED' : '⚠️ SOME TESTS FAILED'}
                </div>
                <div>
                    <strong>Total Tests:</strong> ${total}<br>
                    <strong style="color: #4ec9b0;">Passed:</strong> ${passCount}<br>
                    <strong style="color: #f48771;">Failed:</strong> ${failCount}<br>
                    <strong>Success Rate:</strong> ${percentage}%
                </div>
                <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #555;">
                    ${failCount === 0
                        ? '🎉 The Ads API is properly isolated and does not interfere with other APIs!'
                        : '⚠️ There are issues with API integration. Please review the failed tests above.'}
                </div>
            `;

            document.getElementById('results').appendChild(summaryDiv);

            // Console output
            console.log('='.repeat(60));
            console.log('API ISOLATION TEST SUMMARY');
            console.log('='.repeat(60));
            console.log('Total Tests:', total);
            console.log('Passed:', passCount);
            console.log('Failed:', failCount);
            console.log('Success Rate:', percentage + '%');
            console.log('='.repeat(60));
        }

        // Auto-run tests on page load
        window.addEventListener('load', () => {
            setTimeout(runAllTests, 500);
        });
    </script>
</body>
</html>
