<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, user-scalable=no">
    <title>BBNL IPTV - Home</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="text/javascript" src="$WEBAPIS/webapis/webapis.js"></script>
</head>

<body>
    <!-- Top Navigation Bar -->
    <nav class="navbar">
        <div class="nav-left">
            <div class="logo">
                <span class="logo-icon"></span>
                <span class="logo-text">BBNL</span>
            </div>
            <button class="menu-btn focusable" tabindex="0">☰</button>
            <div class="search-box">
                <input type="text" placeholder="Search for movies, TV shows..." class="search-input">
            </div>
        </div>
        <div class="nav-right">
            <button class="settings-btn focusable" tabindex="0" data-route="settings.html">⚙️</button>
           
        </div>

        <!-- Side Menu Overlay -->
        <div id="sideMenu" class="side-menu-overlay">
            <div class="glass-menu">
                <div class="menu-brand">
                    <span class="logo-icon"></span>
                    <span class="logo-text">BBNL</span>
                </div>


                <div class="menu-list">
                    <button class="menu-item active focusable" tabindex="0" data-route="home.html">
                        Home
                    </button>
                    <button class="menu-item focusable" tabindex="0" data-route="channels.html">
                        Live Channels
                    </button>
                    <button class="menu-item focusable" tabindex="0" data-route="movies.html">
                        Movies
                    </button>
                    <button class="menu-item focusable" tabindex="0" data-route="subscription.html">
                        Subscription
                    </button>
                    <button class="menu-item focusable" tabindex="0" data-route="favorites.html">
                        Favorites
                    </button>
                    <button class="menu-item focusable" tabindex="0" data-route="notifications.html">
                        Notification
                    </button>

                    <div class="menu-divider"></div>

                    <div class="menu-section-label">Help Desk</div>
                    <button class="menu-item sub-item focusable" tabindex="0" data-route="help-desk.html">
                        Get Complaint
                    </button>
                    <button class="menu-item focusable" tabindex="0" data-route="feedback.html">
                        Get Feedback
                    </button>
                </div>
            </div>
            <!-- Click outside to close area -->
            <div class="menu-backdrop" id="menuBackdrop"></div>
        </div>
    </nav>

    <!-- Hero Banner (Ads loaded dynamically) -->
    <section class="hero-banner" id="hero-banner-container">
        <!-- Ads will be rendered here if API succeeds -->
        <!-- If no ads, this section remains empty and invisible -->
    </section>

    <!-- Your OTT Apps Section -->
    <section class="content-section">
        <h2 class="section-title">Your OTT Apps</h2>
        <div class="apps-grid">
            <div class="app-card focusable" tabindex="0" data-app="jiohotstar">
                <div class="app-icon jiohotstar-icon">
                    <span class="star-icon">✦</span>
                    <span class="app-name">JioHotstar</span>
                </div>
                <p class="app-label">Streaming Services</p>
            </div>
            <div class="app-card focusable" tabindex="0" data-app="prime">
                <div class="app-icon prime-icon">
                    <span class="prime-text">prime<br>video</span>
                </div>
                <p class="app-label">Streaming Services</p>
            </div>
            <div class="app-card focusable" tabindex="0" data-app="netflix">
                <div class="app-icon netflix-icon">
                    <span class="netflix-text">NETFLIX</span>
                </div>
                <p class="app-label">Streaming Services</p>
            </div>
            <div class="app-card focusable" tabindex="0" data-app="appletv">
                <div class="app-icon appletv-icon">
                    <span class="apple-logo"></span>
                    <span class="tv-text"> Apple TV</span>
                </div>
                <p class="app-label">Streaming Services</p>
            </div>
            <div class="app-card view-all focusable" tabindex="0">
                <div class="app-icon view-all-icon">
                    <span class="arrow">→</span>
                </div>
                <p class="app-label">View All Ott<br>Streaming Services</p>
            </div>
        </div>
    </section>

    <!-- Live TV Channels Section -->
    <section class="content-section">
        <h2 class="section-title">Live TV Channels</h2>
        <div class="channels-grid" id="home-channels-container">
            <!-- Channels will be loaded dynamically from API -->
            <!-- First 4 channels + View All button -->
        </div>
    </section>

    <script src="js/api.js"></script>
    <script src="js/home.js"></script>
</body>

</html>
