<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, user-scalable=no">
    <title>Fo-Fi TV - Home</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout/home-layout.css">
    <script type="text/javascript" src="$WEBAPIS/webapis/webapis.js"></script>
</head>

<body>
    <!-- Icon-Only Left Sidebar -->
    <aside class="icon-sidebar">
        <!-- BBNL Branding -->
        <div class="sidebar-brand">
            <span class="brand-text">BBNL</span>
        </div>
        <nav class="sidebar-nav">
            <button class="sidebar-icon-btn focusable" tabindex="0" data-route="home.html" title="Home">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </button>
            <button class="sidebar-icon-btn focusable" tabindex="0" data-route="channels.html" title="TV Channels">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect>
                    <polyline points="17 2 12 7 7 2"></polyline>
                </svg>
            </button>
            <button class="sidebar-icon-btn focusable" tabindex="0" data-route="ott-apps.html" title="OTT Apps">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <rect x="7" y="7" width="3" height="9"></rect>
                    <rect x="14" y="7" width="3" height="5"></rect>
                </svg>
            </button>
            <button class="sidebar-icon-btn focusable" tabindex="0" data-route="feedback.html" title="Feedback">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
            </button>
        </nav>
    </aside>

    <!-- Fixed Top Header (Right of Sidebar) -->
    <header class="top-header">
        <div class="header-left">
            <!-- Search Bar (Pill-Shaped) - Now on Left Side -->
            <div class="search-bar">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" class="search-input focusable" tabindex="0" placeholder="Search for movies, TV shows..." id="searchInput">
            </div>
        </div>
        <div class="header-right">
            <!-- Settings Button -->
            <button class="header-icon-btn focusable" tabindex="0" data-route="settings.html" title="Settings">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
        </div>
    </header>

    <!-- Network Settings Popup -->
    <div class="network-popup" id="networkPopup">
        <div class="network-popup-header">Network Settings</div>
        <div class="network-popup-content">
            <!-- WiFi Option -->
            <div class="network-option focusable active" tabindex="0" id="wifiOption">
                <div class="network-option-icon wifi-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12.55a11 11 0 0 1 14.08 0"></path>
                        <path d="M1.42 9a16 16 0 0 1 21.16 0"></path>
                        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
                        <line x1="12" y1="20" x2="12.01" y2="20"></line>
                    </svg>
                </div>
                <div class="network-option-info">
                    <div class="network-option-title" id="wifiTitle">Wifi</div>
                    <div class="network-option-subtitle" id="wifiSubtitle">Checking...</div>
                </div>
                <div class="network-option-status" id="wifiStatus">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="9 12 11 14 15 10"></polyline>
                    </svg>
                </div>
            </div>
            <!-- Ethernet Option -->
            <div class="network-option focusable" tabindex="0" id="ethernetOption">
                <div class="network-option-icon ethernet-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="7" width="20" height="10" rx="2"></rect>
                        <line x1="6" y1="12" x2="6" y2="12"></line>
                        <line x1="10" y1="12" x2="10" y2="12"></line>
                        <line x1="14" y1="12" x2="14" y2="12"></line>
                        <line x1="18" y1="12" x2="18" y2="12"></line>
                    </svg>
                </div>
                <div class="network-option-info">
                    <div class="network-option-title">Ethernet</div>
                    <div class="network-option-subtitle" id="ethernetSubtitle">Available</div>
                </div>
                <div class="network-option-status" id="ethernetStatus" style="display: none;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="9 12 11 14 15 10"></polyline>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content Area (Below Header, Right of Sidebar) -->
    <main class="main-content">

        <!-- Hero Banner (Ads loaded dynamically) -->
        <section class="hero-banner" id="hero-banner-container"></section>

        <!-- Languages Section -->
        <section class="content-section languages-section">
            <h2 class="section-title">Languages</h2>
            <div class="channels-grid" id="home-languages-container">
                <!-- Languages will be loaded dynamically from API -->
            </div>
        </section>

    </main>

    <!-- App Lock Screen Overlay -->
    <div class="applock-overlay" id="appLockOverlay" style="display: none;">
        <div class="applock-card">
            <!-- Left Side - Message -->
            <div class="applock-left">
                <div class="applock-icon-circle">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ff6b6b" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <h1 class="applock-title">Oops! Service Locked</h1>
                <p class="applock-message">We request you to use <strong>BBNL network</strong> to continue enjoying your favorite content.</p>
                <button class="applock-btn focusable" id="appLockRetryBtn" tabindex="0">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="1 4 1 10 7 10"></polyline>
                        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                    </svg>
                    Press back to check status
                </button>
            </div>
            <!-- Right Side - Mascot Illustration -->
            <div class="applock-right">
                <div class="applock-mascot">
                    <!-- Warning Diamond -->
                    <svg class="applock-warning-diamond" width="80" height="80" viewBox="0 0 80 80">
                        <rect x="16" y="16" width="48" height="48" rx="8" transform="rotate(45 40 40)" fill="#f5a623" />
                        <text x="40" y="46" text-anchor="middle" fill="#fff" font-size="28" font-weight="bold">!</text>
                    </svg>
                    <!-- Mascot SVG -->
                    <svg class="applock-mascot-svg" width="200" height="200" viewBox="0 0 200 200">
                        <!-- Body -->
                        <ellipse cx="100" cy="130" rx="60" ry="50" fill="#8B7355"/>
                        <!-- Belly -->
                        <ellipse cx="100" cy="140" rx="40" ry="35" fill="#D4C5A9"/>
                        <!-- Head -->
                        <circle cx="100" cy="75" r="40" fill="#8B7355"/>
                        <!-- Face mask -->
                        <ellipse cx="100" cy="80" rx="30" ry="25" fill="#D4C5A9"/>
                        <!-- Eyes -->
                        <circle cx="88" cy="72" r="6" fill="#1a1a1a"/>
                        <circle cx="112" cy="72" r="6" fill="#1a1a1a"/>
                        <circle cx="90" cy="70" r="2" fill="#fff"/>
                        <circle cx="114" cy="70" r="2" fill="#fff"/>
                        <!-- Eye mask (raccoon) -->
                        <ellipse cx="88" cy="72" rx="12" ry="8" fill="rgba(60,60,60,0.3)"/>
                        <ellipse cx="112" cy="72" rx="12" ry="8" fill="rgba(60,60,60,0.3)"/>
                        <!-- Nose -->
                        <ellipse cx="100" cy="82" rx="5" ry="3" fill="#333"/>
                        <!-- Mouth -->
                        <path d="M94 88 Q100 94 106 88" stroke="#666" stroke-width="2" fill="none"/>
                        <!-- Ears -->
                        <circle cx="70" cy="50" r="12" fill="#8B7355"/>
                        <circle cx="70" cy="50" r="7" fill="#D4C5A9"/>
                        <circle cx="130" cy="50" r="12" fill="#8B7355"/>
                        <circle cx="130" cy="50" r="7" fill="#D4C5A9"/>
                        <!-- Arms -->
                        <ellipse cx="55" cy="130" rx="15" ry="25" fill="#8B7355" transform="rotate(-15 55 130)"/>
                        <ellipse cx="145" cy="130" rx="15" ry="25" fill="#8B7355" transform="rotate(15 145 130)"/>
                        <!-- Feet -->
                        <ellipse cx="80" cy="175" rx="18" ry="10" fill="#6B5B3E"/>
                        <ellipse cx="120" cy="175" rx="18" ry="10" fill="#6B5B3E"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- Exit Confirmation Popup -->
    <div class="exit-popup-overlay" id="exitPopup" style="display: none;">
        <div class="exit-popup">
            <div class="exit-popup-icon">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#f5a623" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
            </div>
            <h2 class="exit-popup-title">Exit App?</h2>
            <p class="exit-popup-message">Are you sure you want to exit Fo-Fi TV?</p>
            <div class="exit-popup-buttons">
                <button class="exit-btn exit-btn-no focusable" id="exitNoBtn" tabindex="0">No, Stay</button>
                <button class="exit-btn exit-btn-yes focusable" id="exitYesBtn" tabindex="0">Yes, Exit</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/home-navigation.js"></script>
    <script src="js/home.js"></script>
</body>

</html>
